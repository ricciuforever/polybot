<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyBot V3 | Azuro GEM Sniper</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(20, 20, 25, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-primary: #00f2ff;
            --accent-secondary: #7000ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --up-color: #00ff88;
            --down-color: #ff3366;
            --warning-color: #ffcc00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100-screen;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Glassmorphism Effect */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Layout Bento Grid */
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: minmax(100px, auto);
            gap: 20px;
        }

        /* Header section */
        .header {
            grid-column: span 12;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            margin-bottom: 10px;
        }

        .logo-section h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .status-pill {
            padding: 6px 15px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-live { background: rgba(0, 255, 136, 0.1); color: var(--up-color); border: 1px solid var(--up-color); }
        .status-dry { background: rgba(255, 204, 0, 0.1); color: var(--warning-color); border: 1px solid var(--warning-color); }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 10px currentColor;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        /* Profile & Balance Bento Card */
        .bento-wallet {
            grid-column: span 4;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .wallet-item {
            display: flex;
            flex-direction: column;
        }

        .label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .value { font-size: 1.8rem; font-weight: 700; color: var(--text-main); }
        .value span { font-size: 0.9rem; font-weight: 400; color: var(--text-dim); }

        /* Multi-Asset Bento Cards */
        .bento-assets {
            grid-column: span 12;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .asset-card {
            padding: 20px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .asset-card:hover { 
            transform: translateY(-5px); 
            border-color: rgba(255, 255, 255, 0.2); 
        }

        .asset-name { font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .asset-price { font-size: 1.4rem; font-weight: 600; margin: 10px 0; }

        /* Oscillation Progress Bar */
        .osc-container {
            margin-top: 15px;
        }

        .osc-header { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 6px; }
        .osc-bar-bg { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.05); border-radius: 4px; overflow: hidden; }
        .osc-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); transition: width 0.5s ease; }

        /* Logs Bento Card */
        .bento-logs {
            grid-column: span 7;
            height: 350px;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .terminal-logs {
            flex: 1;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            padding-right: 10px;
        }

        /* Log Line Colors */
        .log-time { color: var(--accent-primary); margin-right: 8px; }
        .log-signal { color: var(--up-color); font-weight: bold; }
        .log-error { color: var(--down-color); }

        /* History Bento Card */
        .bento-history {
            grid-column: span 5;
            height: 350px;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .trades-list {
            flex: 1;
            overflow-y: auto;
        }

        .trade-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .trade-asset { font-weight: 700; width: 60px; }
        .trade-action { font-size: 0.8rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
        .side-up { background: rgba(0, 255, 136, 0.1); color: var(--up-color); }
        .side-down { background: rgba(255, 51, 102, 0.1); color: var(--down-color); }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        @media (max-width: 900px) {
            .bento-wallet, .bento-logs, .bento-history { grid-column: span 12; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Header -->
        <header class="header glass">
            <div class="logo-section">
                <h1>POLYBOT <span style="font-weight: 100; opacity: 0.5;">V3</span></h1>
            </div>
            <div id="status-display">
                <div class="status-pill status-dry" id="mode-badge">
                    <div class="pulse"></div>
                    <span>Caricamento...</span>
                </div>
            </div>
            <div id="status-text" style="font-size: 0.75rem; color: var(--text-dim);">Sincronizzazione...</div>
        </header>

        <!-- Wallet Bento -->
        <div class="bento-wallet glass">
            <div class="wallet-item">
                <div class="label">Capitale Reale</div>
                <div class="value" id="real-balance">0.00 <span>USDC</span></div>
            </div>
            <div style="display: flex; gap: 40px;">
                <div class="wallet-item">
                    <div class="label">Simulato</div>
                    <div class="value" style="font-size: 1.2rem;" id="sim-balance">0.00</div>
                </div>
                <div class="wallet-item">
                    <div class="label">Gas Matic</div>
                    <div class="value" style="font-size: 1.2rem;" id="matic-balance">0.00</div>
                </div>
            </div>
            <div style="display: flex; gap: 20px; border-top: 1px solid var(--border-color); padding-top: 15px;">
                <div class="wallet-item">
                    <div class="label">PnL Sessione</div>
                    <div class="value" style="font-size: 1.2rem;" id="pnl-value">0.00 <span>USDC</span></div>
                </div>
                <div class="wallet-item">
                    <div class="label">Da Incassare</div>
                    <div class="value" style="font-size: 1.2rem; color: var(--accent-primary);" id="pending-claims">0.00 <span>USDC</span></div>
                </div>
            </div>
        </div>

        <!-- Terminal Logs -->
        <div class="bento-logs glass">
            <div class="label" style="margin-bottom: 15px;"><i class="fas fa-terminal" style="margin-right: 10px;"></i> Terminale Sniper</div>
            <div class="terminal-logs" id="logs-container">
                In attesa di segnali dal motore Azuro GEM...
            </div>
        </div>

        <!-- Multi-Asset Grid -->
        <div class="bento-assets" id="assets-container">
            <!-- Asset cards will be injected here -->
        </div>

        <!-- Trade History -->
        <div class="bento-history glass">
            <div class="label" style="margin-bottom: 15px;"><i class="fas fa-history" style="margin-right: 10px;"></i> Storico Trade</div>
            <div class="trades-list" id="trades-body">
                <!-- Trades will be injected here -->
            </div>
        </div>
    </div>

    <script>
        function updateDashboard() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    // Badge Status
                    const mode = document.getElementById('mode-badge');
                    mode.className = data.dry_run ? 'status-pill status-dry' : 'status-pill status-live';
                    mode.querySelector('span').textContent = data.dry_run ? 'Dry-Run Mode' : 'Live Trading';

                    // Balances
                    document.getElementById('real-balance').innerHTML = `${data.real_balance.toFixed(2)} <span>USDC</span>`;
                    document.getElementById('sim-balance').textContent = data.balance.toFixed(2);
                    document.getElementById('matic-balance').textContent = data.matic_balance.toFixed(4);
                    document.getElementById('pending-claims').innerHTML = `${data.pending_claims.toFixed(2)} <span>USDC</span>`;
                    
                    const pnlEl = document.getElementById('pnl-value');
                    pnlEl.innerHTML = `${data.pnl >= 0 ? '+' : ''}${data.pnl.toFixed(2)} <span>USDC</span>`;
                    pnlEl.style.color = data.pnl >= 0 ? 'var(--up-color)' : 'var(--down-color)';

                    // Assets Bento
                    const container = document.getElementById('assets-container');
                    container.innerHTML = '';
                    
                    for (const [name, info] of Object.entries(data.assets)) {
                        const card = document.createElement('div');
                        card.className = 'asset-card glass';
                        
                        const mov = info.movement;
                        const thr = info.threshold;
                        const pct = Math.min(Math.abs(mov / thr) * 100, 100);
                        const color = mov >= 0 ? 'var(--up-color)' : 'var(--down-color)';
                        const trendIcon = mov >= 0 ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down';
                        
                        card.innerHTML = `
                            <div class="asset-name">
                                <i class="fab fa-${name.toLowerCase()}"></i> ${name}
                                <i class="fas ${trendIcon}" style="color: ${color}; font-size: 0.8rem;"></i>
                                <span style="font-size: 0.65rem; color: var(--text-dim); margin-left: auto;">${info.updated}</span>
                            </div>
                            <div class="asset-price">$${info.price.toLocaleString()}</div>
                            <div class="osc-container">
                                <div class="osc-header">
                                    <span style="color: ${color}">Mov: ${mov > 0 ? '+' : ''}${mov.toFixed(4)}%</span>
                                    <span>Target: ${thr}%</span>
                                </div>
                                <div class="osc-bar-bg">
                                    <div class="osc-bar-fill" style="width: ${pct}%; background: ${color}"></div>
                                </div>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-top: 15px; font-size: 0.7rem;">
                                <div style="color: var(--up-color)">UP: ${info.up_odds.toFixed(2)}x</div>
                                <div style="color: var(--down-color)">DOWN: ${info.down_odds.toFixed(2)}x</div>
                            </div>
                        `;
                        container.appendChild(card);
                    }

                    // Logs
                    const logBox = document.getElementById('logs-container');
                    logBox.innerHTML = data.logs.map(l => {
                        if (l.includes('SEGNALE')) return `<div class="log-line"><span class="log-signal">${l}</span></div>`;
                        if (l.includes('Fallimento') || l.includes('Errore')) return `<div class="log-line"><span class="log-error">${l}</span></div>`;
                        return `<div class="log-line">${l}</div>`;
                    }).join('');
                    logBox.scrollTop = logBox.scrollHeight;

                    document.getElementById('status-text').textContent = 'Ultimo sync: ' + new Date().toLocaleTimeString();
                });
        }

        function fetchTrades() {
            fetch('/api/trades')
                .then(r => r.json())
                .then(data => {
                    const body = document.getElementById('trades-body');
                    body.innerHTML = '';
                    data.reverse().slice(0, 10).forEach(t => {
                        const sideClass = t.action === 'BUY_UP' ? 'side-up' : 'side-down';
                        const sideText = t.action === 'BUY_UP' ? 'UP' : 'DOWN';
                        const row = document.createElement('div');
                        row.className = 'trade-row';
                        row.innerHTML = `
                            <div class="trade-asset">${t.asset}</div>
                            <div class="trade-action ${sideClass}">${sideText}</div>
                            <div style="font-size: 0.8rem; font-weight: 600;">$${t.status.toUpperCase()}</div>
                            <div style="font-size: 0.7rem; color: var(--text-dim);">${new Date(t.timestamp*1000).toLocaleTimeString()}</div>
                        `;
                        body.appendChild(row);
                    });
                });
        }

        setInterval(updateDashboard, 2000);
        setInterval(fetchTrades, 10000);
        updateDashboard();
        fetchTrades();
    </script>
</body>
</html>
