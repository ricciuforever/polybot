<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyBot Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #00d2ff;
            --up-color: #00e676;
            --down-color: #ff1744;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--accent);
            margin: 0;
            font-size: 2.5em;
        }

        .header p {
            color: var(--text-muted);
            margin: 5px 0 0 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .panel h2 {
            margin-top: 0;
            font-size: 1.2em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }

        .sub-value {
            font-size: 1em;
            color: var(--text-muted);
        }

        .up { color: var(--up-color); }
        .down { color: var(--down-color); }

        .logs {
            background-color: #000;
            color: #0f0;
            font-family: monospace;
            padding: 15px;
            border-radius: 5px;
            height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border);
            white-space: pre-wrap;
        }

        .asset-card {
            background-color: #252525;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .asset-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .asset-name {
            font-size: 1.4em;
            font-weight: bold;
            color: var(--accent);
        }

        .asset-price {
            font-size: 1.2em;
        }

        .asset-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        .odds-bar {
            display: flex;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
            background-color: #333;
        }

        .odds-up { background-color: var(--up-color); }
        .odds-down { background-color: var(--down-color); }

        .time-left {
            font-size: 0.8em;
            color: #ff9800;
            text-align: right;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PolyBot Dashboard</h1>
        <p id="status-text">Connessione in corso...</p>
    </div>

    <div class="grid">
        <!-- Portafoglio -->
        <div class="panel">
            <h2>Portafoglio <span id="mode-badge" style="font-size: 0.7em; padding: 3px 8px; border-radius: 12px; background: #333;">LIVE</span></h2>
            <div class="value" id="real-balance">0.00 USDC</div>
            <div class="sub-value">Simulato: <span id="sim-balance">0.00</span> USDC</div>
            <div class="sub-value" style="margin-top:10px;">MATIC Gas: <span id="matic-balance">0.00</span></div>
            <div class="sub-value" style="color: #ff9800;">Da incassare: <span id="pending-claims">0.00</span> USDC</div>
        </div>

        <!-- Mercati Attivi (Multi-Asset) -->
        <div class="panel" style="grid-column: span 2;">
            <h2>Mercati Attivi (5 Minuti)</h2>
            <div id="assets-container">
                <!-- Le card degli asset verranno iniettate qui via JS -->
                <div style="color: var(--text-muted); text-align: center; padding: 20px;">In attesa di dati dal bot...</div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>Live Logs</h2>
        <div class="logs" id="logs-container"></div>
    </div>

    <!-- Storico Scommesse -->
    <div class="panel" style="margin-top: 20px;">
        <h2>Storico Scommesse (trades.json)</h2>
        <div style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="filter-asset" placeholder="Filtra per Asset (es. BTC)" style="padding: 8px; background: #333; color: white; border: 1px solid var(--border); border-radius: 4px; flex: 1; min-width: 150px;">
            <select id="filter-status" style="padding: 8px; background: #333; color: white; border: 1px solid var(--border); border-radius: 4px; flex: 1; min-width: 150px;">
                <option value="">Tutti gli stati</option>
                <option value="pending">Pending</option>
                <option value="resolved">Resolved</option>
                <option value="resolved_unverified">Resolved (Unverified)</option>
                <option value="claiming">Claiming</option>
                <option value="claimed">Claimed</option>
                <option value="lost">Lost</option>
                <option value="failed">Failed</option>
            </select>
        </div>
        <div style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9em;">
                <thead>
                    <tr style="border-bottom: 1px solid var(--border); color: var(--text-muted);">
                        <th style="padding: 10px; cursor: pointer;" onclick="sortTrades('timestamp')">Data ↕</th>
                        <th style="padding: 10px; cursor: pointer;" onclick="sortTrades('asset')">Asset ↕</th>
                        <th style="padding: 10px; cursor: pointer;" onclick="sortTrades('action')">Azione ↕</th>
                        <th style="padding: 10px; cursor: pointer;" onclick="sortTrades('status')">Esito ↕</th>
                        <th style="padding: 10px;">Mercato</th>
                    </tr>
                </thead>
                <tbody id="trades-body">
                    <tr><td colspan="5" style="text-align: center; padding: 20px; color: var(--text-muted);">Caricamento storico...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let tradesData = [];
        let sortCol = 'timestamp';
        let sortAsc = false;

        function fetchTrades() {
            fetch('/api/trades')
                .then(res => res.json())
                .then(data => {
                    tradesData = data;
                    renderTrades();
                })
                .catch(err => console.error('Errore fetch trades:', err));
        }

        function sortTrades(col) {
            if (sortCol === col) {
                sortAsc = !sortAsc;
            } else {
                sortCol = col;
                sortAsc = true;
            }
            renderTrades();
        }

        function renderTrades() {
            const filterAsset = document.getElementById('filter-asset').value.toUpperCase();
            const filterStatus = document.getElementById('filter-status').value.toLowerCase();
            
            let filtered = tradesData.filter(t => {
                const assetMatch = (t.asset || '').toUpperCase().includes(filterAsset);
                const statusMatch = filterStatus === '' || (t.status || '').toLowerCase() === filterStatus;
                return assetMatch && statusMatch;
            });

            filtered.sort((a, b) => {
                let valA = a[sortCol];
                let valB = b[sortCol];
                
                if (sortCol === 'timestamp') {
                    valA = parseFloat(valA) || 0;
                    valB = parseFloat(valB) || 0;
                } else {
                    valA = (valA || '').toString().toLowerCase();
                    valB = (valB || '').toString().toLowerCase();
                }

                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });

            const tbody = document.getElementById('trades-body');
            tbody.innerHTML = '';

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px; color: var(--text-muted);">Nessun trade trovato.</td></tr>';
                return;
            }

            filtered.forEach(t => {
                const tr = document.createElement('tr');
                tr.style.borderBottom = '1px solid #333';
                
                const dateStr = new Date(t.timestamp * 1000).toLocaleString();
                
                let statusColor = 'var(--text-muted)';
                let statusText = (t.status || 'pending').toUpperCase();
                
                if (t.status === 'claimed' || t.status === 'resolved') {
                    statusColor = 'var(--up-color)';
                } else if (t.status === 'lost' || t.status === 'failed') {
                    statusColor = 'var(--down-color)';
                } else if (t.status === 'claiming') {
                    statusColor = '#ff9800';
                } else if (t.status === 'resolved_unverified') {
                    statusColor = '#ff9800';
                    statusText = 'UNVERIFIED';
                }

                let actionColor = t.action === 'BUY_UP' ? 'var(--up-color)' : 'var(--down-color)';

                tr.innerHTML = `
                    <td style="padding: 10px;">${dateStr}</td>
                    <td style="padding: 10px; font-weight: bold;">${t.asset || 'BTC'}</td>
                    <td style="padding: 10px; color: ${actionColor}; font-weight: bold;">${t.action}</td>
                    <td style="padding: 10px; color: ${statusColor}; font-weight: bold;">${statusText}</td>
                    <td style="padding: 10px; font-size: 0.85em; color: var(--text-muted);">${t.slug}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('filter-asset').addEventListener('input', renderTrades);
        document.getElementById('filter-status').addEventListener('change', renderTrades);

        // Fetch trades periodically
        setInterval(fetchTrades, 10000);
        fetchTrades();

        function updateDashboard() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    // Update Mode
                    const modeBadge = document.getElementById('mode-badge');
                    if (data.dry_run) {
                        modeBadge.textContent = 'DRY-RUN';
                        modeBadge.style.backgroundColor = '#ff9800';
                        modeBadge.style.color = '#000';
                    } else {
                        modeBadge.textContent = 'LIVE TRADING';
                        modeBadge.style.backgroundColor = 'var(--up-color)';
                        modeBadge.style.color = '#000';
                    }

                    // Update Balances
                    document.getElementById('real-balance').textContent = data.real_balance.toFixed(2) + ' USDC';
                    document.getElementById('sim-balance').textContent = data.balance.toFixed(2);
                    document.getElementById('matic-balance').textContent = data.matic_balance.toFixed(4);
                    document.getElementById('pending-claims').textContent = data.pending_claims.toFixed(2);

                    // Update Multi-Asset Cards
                    const assetsContainer = document.getElementById('assets-container');
                    if (data.assets && Object.keys(data.assets).length > 0) {
                        assetsContainer.innerHTML = ''; // Clear loading text
                        
                        for (const [assetName, assetData] of Object.entries(data.assets)) {
                            const movClass = assetData.movement >= 0 ? 'up' : 'down';
                            const movSign = assetData.movement >= 0 ? '+' : '';
                            
                            const upPct = (assetData.up_price * 100).toFixed(0);
                            const downPct = (assetData.down_price * 100).toFixed(0);

                            // Formattazione tempo rimanente
                            const minutesLeft = Math.floor(assetData.time_left / 60);
                            const secondsLeft = assetData.time_left % 60;
                            const timeString = assetData.time_left > 0 
                                ? `${minutesLeft}m ${secondsLeft}s rimanenti` 
                                : 'In risoluzione...';

                            const card = document.createElement('div');
                            card.className = 'asset-card';
                            card.innerHTML = `
                                <div class="asset-header">
                                    <div class="asset-name">${assetName}</div>
                                    <div class="asset-price">$${assetData.price.toFixed(2)} <span class="${movClass}" style="font-size: 0.7em;">(${movSign}${assetData.movement.toFixed(4)}%)</span></div>
                                </div>
                                <div class="asset-details">
                                    <div>Target: $${assetData.target_price.toFixed(2)}</div>
                                    <div>Up: ${assetData.up_price.toFixed(2)} | Down: ${assetData.down_price.toFixed(2)}</div>
                                </div>
                                <div class="odds-bar">
                                    <div class="odds-up" style="width: ${upPct}%;"></div>
                                    <div class="odds-down" style="width: ${downPct}%;"></div>
                                </div>
                                <div class="time-left">${timeString}</div>
                            `;
                            assetsContainer.appendChild(card);
                        }
                    }

                    // Update Logs
                    const logsContainer = document.getElementById('logs-container');
                    logsContainer.innerHTML = data.logs.join('<br>');
                    logsContainer.scrollTop = logsContainer.scrollHeight;

                    document.getElementById('status-text').textContent = 'Ultimo aggiornamento: ' + new Date().toLocaleTimeString();
                })
                .catch(error => {
                    console.error('Error fetching status:', error);
                    document.getElementById('status-text').textContent = 'Errore di connessione al bot.';
                    document.getElementById('status-text').style.color = 'var(--down-color)';
                });
        }

        // Update every 2 seconds
        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
